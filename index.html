<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿アプリ Pro - Auto Fixed Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4a90e2; --bg: #f5f7fa; --white: #ffffff;
            --green: #d1e7dd; --blue: #cfe2ff; --pink: #f8d7da; --red: #f1aeb5; --purple: #e2d9f3;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* タブ */
        .tab-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); 
                   display: flex; background: var(--white); border-top: 1px solid #ddd; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--primary); border-top: 3px solid var(--primary); }
        .page { display: none; }
        .page.active { display: block; }

        /* カレンダー */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ddd; border: 1px solid #ddd; }
        .calendar-day { background: var(--white); min-height: 75px; padding: 5px; font-size: 11px; cursor: pointer; position: relative; }
        .amount-tag { display: block; margin-top: 3px; font-weight: bold; text-align: center; border-radius: 4px; padding: 1px; font-size: 9px; }
        .card-info { font-size: 8px; color: #777; display: block; margin-top: 2px; }

        /* リスト */
        .detail-list { margin-top: 15px; background: var(--white); border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .entry-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; }
        .btn-group { display: flex; gap: 5px; }
        .btn-edit { background: #ffc107; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }

        /* 設定・フォーム */
        .config-section { background: var(--white); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .card-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        .fixed-card { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .small-btn { padding: 8px; font-size: 12px; background: #eee; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        
        /* 分析 */
        .stats-box { display: flex; justify-content: space-between; background: #eee; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 14px; }
        .rank-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div class="container">
    <div id="calendar" class="page active">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">◀</button>
            <h2 id="currentMonthLabel"></h2>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div id="dayDetails" class="detail-list">日付を選択</div>
    </div>

    <div id="input" class="page">
        <h2>入力</h2>
        <div class="config-section">
            <input type="hidden" id="fId">
            <label>日付</label><input type="date" id="fDate">
            <label>タイトル</label><input type="text" id="fTitle">
            <label>金額</label><input type="number" id="fAmount" placeholder="支出はマイナス">
            <label>ジャンル</label><select id="fGenre"></select>
            <label>支払い方法</label><select id="fMethod"></select>
            <label>メモ</label><textarea id="fMemo"></textarea>
            <button class="submit-btn" onclick="saveEntry()">保存</button>
            <button id="cancelEdit" style="display:none; margin-top:5px;" onclick="resetForm()">キャンセル</button>
        </div>
    </div>

    <div id="analysis" class="page">
        <h2>分析</h2>
        <div class="config-section">
            <div class="stats-box"><span>年間支出合計:</span><span id="yearTotal">0円</span></div>
            <div class="stats-box"><span>今月支出合計:</span><span id="monthTotal">0円</span></div>
            <p id="budgetProgress" style="font-size:12px; text-align:right;"></p>
            <canvas id="genreChart" style="max-height:250px; margin-bottom:20px;"></canvas>
            <h3>ジャンル別 (上位)</h3><div id="genreRanking"></div>
            <h3>支払い別 (上位)</h3><div id="methodRanking"></div>
        </div>
    </div>

    <div id="settings" class="page">
        <h2>設定</h2>
        <div class="config-section">
            <label>今月の予算</label><input type="number" id="setBudget" onchange="updateMaster()">
            <label>支払い方法 (カンマ区切り)</label><input type="text" id="setMethods" onchange="updateMaster()">
            <label>ジャンル (カンマ区切り)</label><input type="text" id="setGenres" onchange="updateMaster()">
        </div>
        
        <div class="config-section">
            <label>クレジットカード (名称:締め:支払)</label>
            <div id="cardList"></div>
            <button class="small-btn" onclick="addCardRow()">+ カード追加</button>
        </div>

        <div class="config-section">
            <label>固定費の繰り返し設定 (Googleカレンダー風)</label>
            <div id="fixedList"></div>
            <button class="small-btn" onclick="addFixedRow()">+ 新しい固定費をスケジュール</button>
        </div>

        <div class="config-section">
            <button onclick="exportJSON()">JSON保存</button>
            <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
            <button onclick="document.getElementById('importFile').click()">JSON復元</button>
        </div>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-btn active" onclick="showPage('calendar')">カレンダー</button>
    <button class="tab-btn" onclick="showPage('input')">入力</button>
    <button class="tab-btn" onclick="showPage('analysis')">分析</button>
    <button class="tab-btn" onclick="showPage('settings')">設定</button>
</nav>

<script>
    let appData = {
        entries: [],
        settings: {
            budget: 200000,
            methods: ["現金", "PayPay", "JCBW"],
            genres: ["食費", "交通費", "趣味", "固定費"],
            cards: [],
            fixed: []
        }
    };

    let viewDate = new Date();
    let chartInstance = null;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(pageId === 'calendar') {
            checkAndApplyFixedCosts(); // カレンダー表示時に固定費を自動チェック
            renderCalendar();
        }
        if(pageId === 'input') setupInput();
        if(pageId === 'analysis') renderAnalysis();
        if(pageId === 'settings') renderSettings();
    }

    // --- 固定費の自動登録ロジック (Googleカレンダー風) ---
    function checkAndApplyFixedCosts() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const daysInMonth = new Date(y, m+1, 0).getDate();

        appData.settings.fixed.forEach(f => {
            if(!f.title || !f.amount) return;

            if(f.type === 'monthly') {
                const d = parseInt(f.val);
                if(d >= 1 && d <= daysInMonth) insertFixed(y, m, d, f);
            } else if(f.type === 'weekly') {
                const targetW = parseInt(f.val);
                for(let d=1; d<=daysInMonth; d++) {
                    if(new Date(y, m, d).getDay() === targetW) insertFixed(y, m, d, f);
                }
            } else if(f.type === 'yearly') {
                const [mm, dd] = f.val.split('-').map(v => parseInt(v));
                if(mm === m + 1) insertFixed(y, m, dd, f);
            }
        });
    }

    function insertFixed(y, m, d, f) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        // すでに同じ日付に同じタイトルの固定費があれば重複登録しない
        if(!appData.entries.some(e => e.date === dStr && e.title === f.title)) {
            appData.entries.push({
                id: Date.now() + Math.random(),
                date: dStr,
                title: f.title,
                amount: f.amount,
                genre: "固定費",
                method: appData.settings.methods[0] || "未設定",
                memo: "自動定期登録"
            });
        }
    }

    // --- カレンダー・詳細 ---
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('currentMonthLabel').innerText = `${y}年${m+1}月`;
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m+1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-day" style="background:#f9f9f9"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const items = appData.entries.filter(e => e.date === dateStr);
            const total = items.reduce((s, e) => s + Number(e.amount), 0);
            let bg = ""; const abs = Math.abs(total);
            if(total < 0) {
                if(abs < 1000) bg = "var(--green)";
                else if(abs < 3000) bg = "var(--blue)";
                else if(abs < 5000) bg = "var(--pink)";
                else if(abs < 10000) bg = "var(--red)";
                else bg = "var(--purple)";
            }
            let marks = "";
            appData.settings.cards.forEach(c => {
                if(d == c.close) marks += `<span class="card-info">〆:${c.name}</span>`;
                if(d == c.pay) marks += `<span class="card-info">払:${c.name}</span>`;
            });
            grid.innerHTML += `<div class="calendar-day" onclick="showDayDetails('${dateStr}')">${d}${marks}${total!=0?`<span class="amount-tag" style="background:${bg}">${total.toLocaleString()}</span>`:''}</div>`;
        }
    }

    function showDayDetails(date) {
        const items = appData.entries.filter(e => e.date === date);
        let h = `<h3>${date}</h3>`;
        items.forEach(e => {
            h += `<div class="entry-item"><span>${e.title}: ${Number(e.amount).toLocaleString()}円</span>
                <div class="btn-group"><button class="btn-edit" onclick="startEdit(${e.id})">編集</button>
                <button class="btn-delete" onclick="deleteEntry(${e.id})">削除</button></div></div>`;
        });
        document.getElementById('dayDetails').innerHTML = items.length ? h : "データなし";
    }

    // --- 入力・保存 ---
    function setupInput() {
        document.getElementById('fGenre').innerHTML = appData.settings.genres.map(x => `<option>${x}</option>`).join('');
        document.getElementById('fMethod').innerHTML = appData.settings.methods.map(x => `<option>${x}</option>`).join('');
        if(!document.getElementById('fId').value) document.getElementById('fDate').valueAsDate = new Date();
    }

    function saveEntry() {
        const id = document.getElementById('fId').value;
        const entry = {
            id: id ? Number(id) : Date.now(),
            date: document.getElementById('fDate').value,
            title: document.getElementById('fTitle').value,
            amount: Number(document.getElementById('fAmount').value),
            genre: document.getElementById('fGenre').value,
            method: document.getElementById('fMethod').value,
            memo: document.getElementById('fMemo').value
        };
        if(id) appData.entries = appData.entries.map(e => e.id == id ? entry : e);
        else appData.entries.push(entry);
        resetForm(); showPage('calendar');
    }

    function startEdit(id) {
        const e = appData.entries.find(x => x.id === id);
        showPage('input');
        document.getElementById('fId').value = e.id;
        document.getElementById('fDate').value = e.date;
        document.getElementById('fTitle').value = e.title;
        document.getElementById('fAmount').value = e.amount;
        document.getElementById('fGenre').value = e.genre;
        document.getElementById('fMethod').value = e.method;
        document.getElementById('fMemo').value = e.memo;
        document.getElementById('cancelEdit').style.display = "block";
    }

    function deleteEntry(id) {
        if(confirm("削除しますか？")) { appData.entries = appData.entries.filter(e => e.id !== id); renderCalendar(); document.getElementById('dayDetails').innerHTML = ""; }
    }

    function resetForm() { document.getElementById('fId').value = ""; document.getElementById('fTitle').value = ""; document.getElementById('fAmount').value = ""; document.getElementById('cancelEdit').style.display = "none"; }

    // --- 分析 ---
    function renderAnalysis() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const yearEntries = appData.entries.filter(e => new Date(e.date).getFullYear() === y);
        const monthEntries = yearEntries.filter(e => new Date(e.date).getMonth() === m);
        const yTotal = yearEntries.reduce((s, e) => s + (e.amount < 0 ? e.amount : 0), 0);
        const mTotal = monthEntries.reduce((s, e) => s + (e.amount < 0 ? e.amount : 0), 0);
        document.getElementById('yearTotal').innerText = `${Math.abs(yTotal).toLocaleString()}円`;
        document.getElementById('monthTotal').innerText = `${Math.abs(mTotal).toLocaleString()}円`;
        document.getElementById('budgetProgress').innerText = `予算残高: ${(appData.settings.budget + mTotal).toLocaleString()}円`;
        const genres = {}; monthEntries.forEach(e => { if(e.amount < 0) genres[e.genre] = (genres[e.genre] || 0) + Math.abs(e.amount); });
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('genreChart'), {
            type: 'doughnut', data: { labels: Object.keys(genres), datasets: [{ data: Object.values(genres), backgroundColor: ['#ff6384','#36a2eb','#ffce56','#4bc0c0','#9966ff'] }] },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
        renderRank('genreRanking', genres);
    }

    function renderRank(id, data) {
        const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]);
        document.getElementById(id).innerHTML = sorted.slice(0, 5).map(x => `<div class="rank-item"><span>${x[0]}</span><span>${x[1].toLocaleString()}円</span></div>`).join('');
    }

    // --- 設定 (Googleカレンダー風UI) ---
    function renderSettings() {
        document.getElementById('setBudget').value = appData.settings.budget;
        document.getElementById('setMethods').value = appData.settings.methods.join(',');
        document.getElementById('setGenres').value = appData.settings.genres.join(',');

        const cl = document.getElementById('cardList'); cl.innerHTML = '';
        appData.settings.cards.forEach((c, i) => {
            cl.innerHTML += `<div class="card-row">
                <input type="text" value="${c.name}" onchange="appData.settings.cards[${i}].name=this.value">
                <input type="number" value="${c.close}" onchange="appData.settings.cards[${i}].close=this.value">
                <input type="number" value="${c.pay}" onchange="appData.settings.cards[${i}].pay=this.value">
                <button class="btn-delete small-btn" onclick="appData.settings.cards.splice(${i},1);renderSettings()">×</button></div>`;
        });

        const fl = document.getElementById('fixedList'); fl.innerHTML = '';
        appData.settings.fixed.forEach((f, i) => {
            fl.innerHTML += `
            <div class="fixed-card">
                <div class="card-row">
                    <input type="text" placeholder="項目名" value="${f.title}" onchange="appData.settings.fixed[${i}].title=this.value">
                    <input type="number" placeholder="金額" value="${f.amount}" onchange="appData.settings.fixed[${i}].amount=this.value">
                </div>
                <div class="card-row" style="margin-top:10px;">
                    <select onchange="appData.settings.fixed[${i}].type=this.value; renderSettings();">
                        <option value="monthly" ${f.type=='monthly'?'selected':''}>毎月</option>
                        <option value="weekly" ${f.type=='weekly'?'selected':''}>毎週</option>
                        <option value="yearly" ${f.type=='yearly'?'selected':''}>毎年</option>
                    </select>
                    ${renderFixedValInput(f, i)}
                    <button class="btn-delete small-btn" onclick="appData.settings.fixed.splice(${i},1);renderSettings()">削除</button>
                </div>
            </div>`;
        });
    }

    function renderFixedValInput(f, i) {
        if(f.type === 'monthly') {
            return `<select onchange="appData.settings.fixed[${i}].val=this.value">
                ${Array.from({length:31}, (_,k)=>`<option value="${k+1}" ${f.val==(k+1)?'selected':''}>${k+1}日</option>`).join('')}
            </select>`;
        } else if(f.type === 'weekly') {
            const weeks = ["日","月","火","水","木","金","土"];
            return `<select onchange="appData.settings.fixed[${i}].val=this.value">
                ${weeks.map((w,k)=>`<option value="${k}" ${f.val==k?'selected':''}>${w}曜日</option>`).join('')}
            </select>`;
        } else {
            return `<input type="text" placeholder="MM-DD" style="width:80px" value="${f.val}" onchange="appData.settings.fixed[${i}].val=this.value">`;
        }
    }

    function updateMaster() {
        appData.settings.budget = Number(document.getElementById('setBudget').value);
        appData.settings.methods = document.getElementById('setMethods').value.split(',').map(x => x.trim());
        appData.settings.genres = document.getElementById('setGenres').value.split(',').map(x => x.trim());
    }

    function addCardRow() { appData.settings.cards.push({name:"", close:15, pay:10}); renderSettings(); }
    function addFixedRow() { appData.settings.fixed.push({title:"", amount:0, type:"monthly", val:"1"}); renderSettings(); }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(appData, null, 2)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "kakeibo.json"; a.click();
    }
    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const imported = JSON.parse(ev.target.result);
            appData.entries = imported.entries || [];
            appData.settings = imported.settings || appData.settings;
            renderSettings(); renderCalendar();
            alert("復元完了。設定と固定費スケジュールも更新されました。");
        };
        reader.readAsText(e.target.files[0]);
    }

    function changeMonth(diff) { viewDate.setMonth(viewDate.getMonth() + diff); renderCalendar(); }
    window.onload = () => { renderCalendar(); };
</script>
</body>
</html>
