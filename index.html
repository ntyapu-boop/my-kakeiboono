<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿アプリ Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4a90e2; --bg: #f5f7fa; --white: #ffffff;
            --green: #d1e7dd; --blue: #cfe2ff; --pink: #f8d7da; --red: #f1aeb5; --purple: #e2d9f3;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* タブ */
        .tab-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); 
                   display: flex; background: var(--white); border-top: 1px solid #ddd; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--primary); border-top: 3px solid var(--primary); }
        .page { display: none; }
        .page.active { display: block; }

        /* カレンダー */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ddd; border: 1px solid #ddd; }
        .calendar-day { background: var(--white); min-height: 70px; padding: 5px; font-size: 11px; cursor: pointer; position: relative; }
        .amount-tag { display: block; margin-top: 3px; font-weight: bold; text-align: center; border-radius: 4px; padding: 1px; font-size: 9px; }
        .card-info { font-size: 8px; color: #777; display: block; margin-top: 2px; }

        /* リスト */
        .detail-list { margin-top: 15px; background: var(--white); border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .entry-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; }
        .btn-group { display: flex; gap: 5px; }
        .btn-edit { background: #ffc107; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }

        /* 設定・フォーム */
        .config-section { background: var(--white); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .card-row, .fixed-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        .small-btn { padding: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="calendar" class="page active">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">◀</button>
            <h2 id="currentMonthLabel"></h2>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div id="dayDetails" class="detail-list">日付をタップして詳細を表示</div>
    </div>

    <div id="input" class="page">
        <h2>支出・収入の入力</h2>
        <div class="config-section">
            <label>テンプレートから入力</label>
            <div id="templateContainer" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
        </div>
        <div class="config-section">
            <input type="hidden" id="fId">
            <label>日付</label><input type="date" id="fDate">
            <label>タイトル</label><input type="text" id="fTitle">
            <label>金額</label><input type="number" id="fAmount">
            <label>ジャンル</label><select id="fGenre"></select>
            <label>支払い方法</label><select id="fMethod"></select>
            <label>メモ</label><textarea id="fMemo"></textarea>
            <button class="submit-btn" onclick="saveEntry()">保存</button>
            <button id="cancelEdit" style="display:none; margin-top:5px;" onclick="resetForm()">キャンセル</button>
        </div>
    </div>

    <div id="analysis" class="page">
        <h2>収支分析</h2>
        <div class="config-section">
            <p id="budgetSummary" style="font-weight:bold; font-size:18px;"></p>
            <canvas id="genreChart" width="400" height="400"></canvas>
        </div>
        <div id="rankings" class="config-section"></div>
    </div>

    <div id="settings" class="page">
        <h2>設定</h2>
        
        <div class="config-section">
            <label>今月の予算</label>
            <input type="number" id="setBudget" onchange="updateMasterData()">
            
            <label>支払い方法 (カンマ区切り)</label>
            <input type="text" id="setMethods" placeholder="現金,クレジットカード..." onchange="updateMasterData()">
            
            <label>ジャンル (カンマ区切り)</label>
            <input type="text" id="setGenres" placeholder="食費,交通費,趣味..." onchange="updateMasterData()">
        </div>

        <div class="config-section">
            <label>クレジットカード管理 (名称:締め:支払)</label>
            <div id="cardList"></div>
            <button class="small-btn" onclick="addCardRow()">+ カード追加</button>
        </div>

        <div class="config-section">
            <label>固定費設定 (タイトル:金額:頻度:日)</label>
            <p style="font-size:10px; color:666;">頻度: weekly, monthly, yearly, day(曜日は0-6)</p>
            <div id="fixedList"></div>
            <button class="small-btn" onclick="addFixedRow()">+ 固定費追加</button>
        </div>

        <div class="config-section">
            <button onclick="exportJSON()">JSONバックアップ</button>
            <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
            <button onclick="document.getElementById('importFile').click()">JSON復元</button>
        </div>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-btn active" onclick="showPage('calendar')">カレンダー</button>
    <button class="tab-btn" onclick="showPage('input')">入力</button>
    <button class="tab-btn" onclick="showPage('analysis')">分析</button>
    <button class="tab-btn" onclick="showPage('settings')">設定</button>
</nav>

<script>
    let appData = {
        entries: [],
        settings: {
            budget: 200000,
            methods: ["現金", "クレカ"],
            genres: ["食費", "交通費", "趣味"],
            cards: [{name: "JCBW", close: 15, pay: 10}],
            fixed: [{title: "家賃", amount: 60000, type: "monthly", val: 25}]
        }
    };

    let viewDate = new Date();
    let chartInstance = null;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(pageId === 'calendar') renderCalendar();
        if(pageId === 'input') setupInputPage();
        if(pageId === 'analysis') renderAnalysis();
        if(pageId === 'settings') renderSettings();
    }

    // --- カレンダーロジック ---
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('currentMonthLabel').innerText = `${y}年${m+1}月`;

        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m+1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-day" style="background:#f9f9f9"></div>`;

        for(let d=1; d<=last; d++) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEntries = appData.entries.filter(e => e.date === dateStr);
            const total = dayEntries.reduce((s, e) => s + Number(e.amount), 0);
            
            let bg = "";
            const abs = Math.abs(total);
            if(total < 0) {
                if(abs < 1000) bg = "var(--green)";
                else if(abs < 3000) bg = "var(--blue)";
                else if(abs < 5000) bg = "var(--pink)";
                else if(abs < 10000) bg = "var(--red)";
                else bg = "var(--purple)";
            }

            let cardMarks = "";
            appData.settings.cards.forEach(c => {
                if(d == c.close) cardMarks += `<span class="card-info">〆:${c.name}</span>`;
                if(d == c.pay) cardMarks += `<span class="card-info">払:${c.name}</span>`;
            });

            grid.innerHTML += `
                <div class="calendar-day" onclick="showDayDetails('${dateStr}')">
                    ${d}${cardMarks}
                    ${total != 0 ? `<span class="amount-tag" style="background:${bg}">${total.toLocaleString()}</span>` : ''}
                </div>`;
        }
    }

    function showDayDetails(date) {
        const div = document.getElementById('dayDetails');
        const items = appData.entries.filter(e => e.date === date);
        let h = `<h3>${date}</h3>`;
        items.forEach(e => {
            h += `<div class="entry-item">
                <span>${e.title}: ${Number(e.amount).toLocaleString()}円</span>
                <div class="btn-group">
                    <button class="btn-edit" onclick="startEdit(${e.id})">編集</button>
                    <button class="btn-delete" onclick="deleteEntry(${e.id})">削除</button>
                </div>
            </div>`;
        });
        div.innerHTML = items.length ? h : "データがありません";
    }

    // --- 入力・編集ロジック ---
    function setupInputPage() {
        const g = document.getElementById('fGenre'), m = document.getElementById('fMethod');
        g.innerHTML = appData.settings.genres.map(x => `<option>${x}</option>`).join('');
        m.innerHTML = appData.settings.methods.map(x => `<option>${x}</option>`).join('');
        document.getElementById('fDate').valueAsDate = new Date();
    }

    function saveEntry() {
        const id = document.getElementById('fId').value;
        const entry = {
            id: id ? Number(id) : Date.now(),
            date: document.getElementById('fDate').value,
            title: document.getElementById('fTitle').value,
            amount: Number(document.getElementById('fAmount').value),
            genre: document.getElementById('fGenre').value,
            method: document.getElementById('fMethod').value,
            memo: document.getElementById('fMemo').value
        };
        if(id) appData.entries = appData.entries.map(e => e.id == id ? entry : e);
        else appData.entries.push(entry);
        resetForm();
        showPage('calendar');
    }

    function startEdit(id) {
        const e = appData.entries.find(x => x.id === id);
        showPage('input');
        document.getElementById('fId').value = e.id;
        document.getElementById('fDate').value = e.date;
        document.getElementById('fTitle').value = e.title;
        document.getElementById('fAmount').value = e.amount;
        document.getElementById('fGenre').value = e.genre;
        document.getElementById('fMethod').value = e.method;
        document.getElementById('fMemo').value = e.memo;
        document.getElementById('cancelEdit').style.display = "block";
    }

    function deleteEntry(id) {
        if(confirm("削除しますか？")) {
            appData.entries = appData.entries.filter(e => e.id !== id);
            renderCalendar();
            document.getElementById('dayDetails').innerHTML = "";
        }
    }

    function resetForm() {
        document.getElementById('fId').value = "";
        document.getElementById('fTitle').value = "";
        document.getElementById('fAmount').value = "";
        document.getElementById('cancelEdit').style.display = "none";
    }

    // --- 設定ロジック (マスターデータ) ---
    function renderSettings() {
        document.getElementById('setBudget').value = appData.settings.budget;
        document.getElementById('setMethods').value = appData.settings.methods.join(',');
        document.getElementById('setGenres').value = appData.settings.genres.join(',');
        
        const cardList = document.getElementById('cardList');
        cardList.innerHTML = '';
        appData.settings.cards.forEach((c, i) => {
            cardList.innerHTML += `<div class="card-row">
                <input type="text" value="${c.name}" onchange="updateCard(${i},'name',this.value)">
                <input type="number" value="${c.close}" style="width:50px" onchange="updateCard(${i},'close',this.value)">
                <input type="number" value="${c.pay}" style="width:50px" onchange="updateCard(${i},'pay',this.value)">
                <button class="btn-delete small-btn" onclick="appData.settings.cards.splice(${i},1);renderSettings()">削</button>
            </div>`;
        });

        const fixedList = document.getElementById('fixedList');
        fixedList.innerHTML = '';
        appData.settings.fixed.forEach((f, i) => {
            fixedList.innerHTML += `<div class="fixed-row">
                <input type="text" value="${f.title}" style="width:80px" onchange="updateFixed(${i},'title',this.value)">
                <input type="number" value="${f.amount}" style="width:70px" onchange="updateFixed(${i},'amount',this.value)">
                <select style="width:80px" onchange="updateFixed(${i},'type',this.value)">
                    <option value="monthly" ${f.type=='monthly'?'selected':''}>月間</option>
                    <option value="weekly" ${f.type=='weekly'?'selected':''}>週次</option>
                </select>
                <input type="number" value="${f.val}" style="width:40px" onchange="updateFixed(${i},'val',this.value)">
                <button class="btn-delete small-btn" onclick="appData.settings.fixed.splice(${i},1);renderSettings()">削</button>
            </div>`;
        });
    }

    function updateMasterData() {
        appData.settings.budget = Number(document.getElementById('setBudget').value);
        appData.settings.methods = document.getElementById('setMethods').value.split(',').map(x => x.trim());
        appData.settings.genres = document.getElementById('setGenres').value.split(',').map(x => x.trim());
    }

    function addCardRow() { appData.settings.cards.push({name:"", close:15, pay:10}); renderSettings(); }
    function updateCard(i, k, v) { appData.settings.cards[i][k] = v; }
    function addFixedRow() { appData.settings.fixed.push({title:"", amount:0, type:"monthly", val:1}); renderSettings(); }
    function updateFixed(i, k, v) { appData.settings.fixed[i][k] = v; }

    // --- 分析ロジック ---
    function renderAnalysis() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const monthEntries = appData.entries.filter(e => {
            const d = new Date(e.date);
            return d.getFullYear() === y && d.getMonth() === m;
        });
        const totalOut = monthEntries.reduce((s, e) => s + (e.amount < 0 ? e.amount : 0), 0);
        const budget = appData.settings.budget;
        document.getElementById('budgetSummary').innerText = `予算残高: ${(budget + totalOut).toLocaleString()}円 / ${budget.toLocaleString()}円`;

        const genreTotals = {};
        monthEntries.forEach(e => {
            if(e.amount < 0) genreTotals[e.genre] = (genreTotals[e.genre] || 0) + Math.abs(e.amount);
        });

        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('genreChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(genreTotals),
                datasets: [{ data: Object.values(genreTotals), backgroundColor: ['#ff6384','#36a2eb','#ffce56','#4bc0c0','#9966ff'] }]
            }
        });
    }

    // --- バックアップ系 ---
    function exportJSON() {
        const blob = new Blob([JSON.stringify(appData, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "kakeibo_backup.json"; a.click();
    }
    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (event) => { appData = JSON.parse(event.target.result); renderCalendar(); alert("復元完了"); };
        reader.readAsText(e.target.files[0]);
    }

    function changeMonth(diff) { viewDate.setMonth(viewDate.getMonth() + diff); renderCalendar(); }
    window.onload = () => { renderCalendar(); };
</script>

</body>
</html>
