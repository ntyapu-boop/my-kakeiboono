<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家計簿 Pro+ Text</title>
    <style>
        :root { --main: #007bff; --bg: #f8f9fa; --danger: #dc3545; --success: #28a745; --sub: #6c757d; --dark: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding: 15px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block !important; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; font-size: 10px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .header-summary { background: var(--dark); color: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
        .day { background: white; min-height: 85px; padding: 4px; box-sizing: border-box; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .day-label { display: block; font-size: 8px; transform: scale(0.8); transform-origin: left top; white-space: nowrap; font-weight: bold; }
        .day-sum { display: block; text-align: center; font-weight: bold; font-size: 10px; }
        .box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 8px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-main { background: var(--main); color: white; }
        .btn-sm { padding: 8px 12px; border-radius: 6px; border: none; font-size: 12px; color: white; cursor: pointer; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .wd-opt { flex:1; text-align:center; padding:8px 0; background:#eee; border-radius:4px; font-size:12px; cursor:pointer; font-weight:bold; }
        .wd-opt.active { background:var(--success); color:white; }
        .rank-bar-bg { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; position: relative; margin-top: 4px; }
        .rank-bar-fill { height: 100%; background: var(--main); transition: width 0.3s; }
    </style>
</head>
<body>

<div id="top-bar" style="padding: 10px 15px 0 15px;">
    <div class="header-summary">
        <span id="header-month">----年--月</span>
        <span>支出: <b id="header-total">0</b> 円</span>
    </div>
</div>

<div id="page-home" class="page active">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <button onclick="changeMonth(-1)" style="border:none;background:none;font-size:24px;">◀</button>
        <button onclick="changeMonth(1)" style="border:none;background:none;font-size:24px;">▶</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div id="details-list" style="margin-top:20px;"></div>
</div>

<div id="page-report" class="page">
    <h2>分析・ランキング</h2>
    <div class="box" style="border-left: 5px solid var(--main);">
        <h4>💳 カード引落予定</h4>
        <div id="card-bill-summary"></div>
    </div>
    <div class="box">
        <h4 id="rank-title">支出ランキング</h4>
        <div id="ranking-list"></div>
    </div>
</div>

<div id="page-input" class="page">
    <h2>登録</h2>
    <input type="date" id="f-date">
    <input type="text" id="f-title" placeholder="タイトル">
    <select id="f-method"></select>
    <input type="number" id="f-amount" placeholder="金額">
    <textarea id="f-memo" rows="2" placeholder="メモ"></textarea>
    <button class="btn btn-main" onclick="saveEntry()">保存</button>
</div>

<div id="page-settings" class="page">
    <h2>設定・バックアップ</h2>
    
    <div class="box">
        <h4>☁️ バックアップ・復元</h4>
        <button onclick="copyToClipboard()" class="btn-sm" style="background:var(--sub); width:100%; margin-bottom:10px;">現在のデータをテキストでコピー</button>
        <textarea id="i-backup" placeholder="復元する文字列をここに貼り付け" rows="3"></textarea>
        <button onclick="importFromText()" class="btn-sm" style="background:var(--danger); width:100%;">テキストから復元を実行</button>
        <p style="font-size:10px; color:#888; margin-top:8px;">※復元すると現在のデータは上書きされます。</p>
    </div>

    <div class="box">
        <h4>🔄 固定費マスタ</h4>
        <div id="routine-list"></div>
        <div style="background:#eef7ff; padding:12px; border-radius:10px; margin-top:10px;">
            <input type="text" id="r-title" placeholder="項目名">
            <input type="number" id="r-amount" placeholder="金額">
            <select id="r-method"></select>
            <select id="r-cycle" onchange="toggleCycleOptions()">
                <option value="daily">毎日</option>
                <option value="weekday">曜日指定</option>
                <option value="weekly">毎週</option>
                <option value="monthly">毎月</option>
                <option value="yearly">毎年</option>
            </select>
            <div id="opt-weekday" style="display:none; gap:4px; margin-bottom:8px;">
                <div class="wd-opt" data-wd="1">月</div><div class="wd-opt" data-wd="2">火</div><div class="wd-opt" data-wd="3">水</div>
                <div class="wd-opt" data-wd="4">木</div><div class="wd-opt" data-wd="5">金</div><div class="wd-opt" data-wd="6">土</div><div class="wd-opt" data-wd="0">日</div>
            </div>
            <div id="opt-date" style="display:none;">
                <input type="number" id="r-month" placeholder="月" style="width:48%; display:inline-block;">
                <input type="number" id="r-day" placeholder="日" style="width:48%; display:inline-block;">
            </div>
            <button class="btn-sm" style="background:var(--main); width:100%;" onclick="saveRoutine()">マスタに追加</button>
        </div>
    </div>

    <div class="box">
        <label>カード設定 (名:締:払)</label>
        <input type="text" id="s-cards" placeholder="JCBW:99:10">
        <label>支払い方法 (カンマ区切り)</label>
        <input type="text" id="s-methods">
        <button class="btn btn-main" onclick="saveCustoms()">更新</button>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" id="nav-home" onclick="showPage('home')"><span class="nav-icon">📅</span>ホーム</div>
    <div class="nav-item" id="nav-report" onclick="showPage('report')"><span class="nav-icon">📊</span>分析</div>
    <div class="nav-item" id="nav-input" onclick="showPage('input')"><span class="nav-icon">✍</span>入力</div>
    <div class="nav-item" id="nav-settings" onclick="showPage('settings')"><span class="nav-icon">⚙</span>設定</div>
</div>

<script>
    let entries = [];
    try { entries = JSON.parse(localStorage.getItem('kb_final_data')) || []; } catch(e) { entries = []; }
    let settings = { cards: [], methods: ["現金", "JCBW", "リクルート", "Olive"], masterRoutines: [] };
    try { const s = JSON.parse(localStorage.getItem('kb_final_sets')); if(s) settings = s; } catch(e) {}

    let currentViewDate = new Date();

    function saveLocal() {
        localStorage.setItem('kb_final_data', JSON.stringify(entries));
        localStorage.setItem('kb_final_sets', JSON.stringify(settings));
    }

    function processRoutines() {
        const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        const lastDay = new Date(y, m + 1, 0).getDate();
        let updated = false;
        settings.masterRoutines.forEach(r => {
            for (let d = 1; d <= lastDay; d++) {
                const dateObj = new Date(y, m, d), dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                let shouldAdd = false;
                switch (r.cycle) {
                    case 'daily': shouldAdd = true; break;
                    case 'weekday': if (r.weekdays && r.weekdays.includes(dateObj.getDay())) shouldAdd = true; break;
                    case 'monthly': if (parseInt(r.day) === d || (r.day >= 99 && d === lastDay)) shouldAdd = true; break;
                    case 'yearly': if (parseInt(r.month) === (m + 1) && parseInt(r.day) === d) shouldAdd = true; break;
                    case 'weekly': if (r.weekdays && dateObj.getDay() === r.weekdays[0]) shouldAdd = true; break;
                }
                if (shouldAdd) {
                    const autoTitle = `[固] ${r.title}`;
                    if (!entries.some(e => e.date === dStr && e.title === autoTitle)) {
                        entries.push({ id: Date.now() + Math.random(), date: dStr, title: autoTitle, method: r.method, amount: -Math.abs(r.amount) });
                        updated = true;
                    }
                }
            }
        });
        if (updated) saveLocal();
    }

    function renderCalendar() {
        processRoutines();
        const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        document.getElementById('header-month').textContent = `${y}年 ${m + 1}月`;
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
        let html = '';
        let totalOut = 0;
        for(let i=0; i<first; i++) html += '<div class="day" style="background:#eee"></div>';
        for(let d=1; d<=last; d++) {
            const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dEntries = entries.filter(e => e.date === dStr);
            const dSum = dEntries.reduce((s, e) => s + e.amount, 0);
            if(dSum < 0) totalOut += Math.abs(dSum);
            let labels = "";
            settings.cards.forEach(c => {
                if((c.close === 99 && d === last) || c.close === d) labels += `<span class="day-label" style="color:red">●締:${c.name}</span>`;
                if(c.pay === d) labels += `<span class="day-label" style="color:blue">●落:${c.name}</span>`;
            });
            html += `<div class="day" onclick="showDayDetails('${dStr}')"><div><span>${d}</span>${labels}</div><span class="day-sum">${dSum !== 0 ? Math.abs(dSum).toLocaleString() : ''}</span></div>`;
        }
        document.getElementById('calendar').innerHTML = html;
        document.getElementById('header-total').textContent = totalOut.toLocaleString();
    }

    function showDayDetails(date) {
        const list = entries.filter(e => e.date === date);
        let html = `<h4>${date}</h4>` + list.map(e => `
            <div class="box" style="margin-bottom:8px; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><b>${e.title}</b><br><small>${e.method} / ${Math.abs(e.amount).toLocaleString()}円</small></div>
                <button class="btn-sm" style="background:var(--danger);" onclick="deleteEntry(${e.id})">削除</button>
            </div>`).join('') || "<p>データなし</p>";
        document.getElementById('details-list').innerHTML = html;
    }

    function deleteEntry(id) { entries = entries.filter(e => e.id !== id); saveLocal(); renderCalendar(); document.getElementById('details-list').innerHTML = ""; }

    function renderReport() {
        const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        let billHtml = "";
        settings.cards.forEach(card => {
            let endDate = (card.close === 99) ? new Date(y, m, 0) : new Date(y, m - 1, card.close);
            let startDate = new Date(endDate); startDate.setMonth(startDate.getMonth() - 1); startDate.setDate(startDate.getDate() + 1);
            const total = entries.reduce((s, e) => {
                const ed = new Date(e.date);
                return (e.method === card.name && e.amount < 0 && ed >= startDate && ed <= endDate) ? s + Math.abs(e.amount) : s;
            }, 0);
            billHtml += `<div class="list-row"><span>${card.name} (${m+1}/${card.pay}落)</span><b>${total.toLocaleString()} 円</b></div>`;
        });
        document.getElementById('card-bill-summary').innerHTML = billHtml || "設定なし";

        const counts = {};
        entries.filter(e => e.date.startsWith(`${y}-${String(m + 1).padStart(2, '0')}`) && e.amount < 0).forEach(e => {
            const t = e.title.replace("[固] ", "");
            counts[t] = (counts[t] || 0) + Math.abs(e.amount);
        });
        const rankData = Object.keys(counts).map(k => ({title: k, total: counts[k]})).sort((a,b) => b.total - a.total);
        const max = rankData[0]?.total || 1;
        document.getElementById('rank-title').textContent = `${m + 1}月の支出ランキング`;
        document.getElementById('ranking-list').innerHTML = rankData.slice(0, 5).map(item => `
            <div style="margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; font-size:12px;"><span>${item.title}</span><span>${item.total.toLocaleString()} 円</span></div>
                <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${(item.total/max)*100}%"></div></div>
            </div>`).join('') || "データなし";
    }

    function renderSettings() {
        document.getElementById('s-cards').value = settings.cards.map(c => `${c.name}:${c.close}:${c.pay}`).join(', ');
        document.getElementById('s-methods').value = settings.methods.join(', ');
        document.getElementById('r-method').innerHTML = settings.methods.map(m => `<option>${m}</option>`).join('');
        document.getElementById('routine-list').innerHTML = settings.masterRoutines.map(r => `
            <div style="background:#f9f9f9; padding:8px; border-radius:8px; margin-bottom:5px; font-size:12px;">
                <div style="display:flex; justify-content:space-between;"><b>${r.title}</b> <span>${r.amount.toLocaleString()}円</span></div>
                <div style="margin-top:5px; text-align:right;">
                    <button class="btn-sm" style="background:var(--main);" onclick="editRoutine(${r.id})">編集</button>
                    <button class="btn-sm" style="background:var(--danger);" onclick="settings.masterRoutines=settings.masterRoutines.filter(x=>x.id!==${r.id});saveLocal();renderSettings();">削除</button>
                </div>
            </div>`).join('') || "未登録";
    }

    function copyToClipboard() {
        const text = JSON.stringify({ entries, settings });
        navigator.clipboard.writeText(text).then(() => alert("コピーしました！メモ帳などに保存してください。"));
    }

    function importFromText() {
        const text = document.getElementById('i-backup').value;
        if(!text) return;
        try {
            const d = JSON.parse(text);
            if(d.entries && d.settings) {
                entries = d.entries;
                settings = d.settings;
                saveLocal();
                alert("復元に成功しました！");
                location.reload();
            } else { alert("データ形式が正しくありません。"); }
        } catch(e) { alert("パースに失敗しました。文字列が正しいか確認してください。"); }
    }

    function toggleCycleOptions() {
        const c = document.getElementById('r-cycle').value;
        document.getElementById('opt-weekday').style.display = (c === 'weekday' || c === 'weekly') ? 'flex' : 'none';
        document.getElementById('opt-date').style.display = (c === 'monthly' || c === 'yearly') ? 'block' : 'none';
    }

    function saveRoutine() {
        const title = document.getElementById('r-title').value, amt = document.getElementById('r-amount').value;
        if (!title || !amt) return;
        settings.masterRoutines.push({ id: Date.now(), title, amount: parseInt(amt), method: document.getElementById('r-method').value, cycle: document.getElementById('r-cycle').value, weekdays: Array.from(document.querySelectorAll('.wd-opt.active')).map(el => parseInt(el.dataset.wd)), month: document.getElementById('r-month').value, day: document.getElementById('r-day').value });
        saveLocal(); renderSettings();
    }

    function editRoutine(id) {
        const r = settings.masterRoutines.find(x => x.id === id);
        document.getElementById('r-title').value = r.title; document.getElementById('r-amount').value = r.amount; document.getElementById('r-method').value = r.method; document.getElementById('r-cycle').value = r.cycle; document.getElementById('r-month').value = r.month || ""; document.getElementById('r-day').value = r.day || "";
        toggleCycleOptions(); settings.masterRoutines = settings.masterRoutines.filter(x => x.id !== id); renderSettings();
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('nav-' + p).classList.add('active');
        if(p === 'home') renderCalendar();
        if(p === 'report') renderReport();
        if(p === 'settings') renderSettings();
    }

    function saveEntry() {
        const amt = parseInt(document.getElementById('f-amount').value); if(!amt) return;
        entries.push({ id: Date.now(), date: document.getElementById('f-date').value, title: document.getElementById('f-title').value || "無題", method: document.getElementById('f-method').value, amount: -Math.abs(amt) });
        saveLocal(); showPage('home');
    }

    function saveCustoms() {
        settings.methods = document.getElementById('s-methods').value.split(',').map(s => s.trim());
        settings.cards = document.getElementById('s-cards').value.split(',').filter(s => s.includes(':')).map(s => {
            const [n, c, p] = s.split(':').map(x => x.trim()); return { name: n, close: parseInt(c), pay: parseInt(p) };
        });
        saveLocal(); alert("更新完了"); renderSettings();
    }

    function changeMonth(d) { currentViewDate.setMonth(currentViewDate.getMonth() + d); renderCalendar(); }
    document.querySelectorAll('.wd-opt').forEach(opt => opt.onclick = () => opt.classList.toggle('active'));
    document.getElementById('f-date').valueAsDate = new Date();
    showPage('home');
</script>
</body>
</html>
