<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家計簿 Pro+ Year Edition</title>
    <style>
        :root { --main: #007bff; --bg: #f8f9fa; --danger: #dc3545; --success: #28a745; --sub: #6c757d; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding: 15px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block !important; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; font-size: 10px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .header-summary { background: #333; color: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
        .day { background: white; min-height: 85px; padding: 4px; box-sizing: border-box; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .day-label { display: block; font-size: 8px; transform: scale(0.8); transform-origin: left top; white-space: nowrap; font-weight: bold; }
        .day-sum { display: block; text-align: center; font-weight: bold; font-size: 10px; }
        .box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .math-row { font-family: monospace; font-size: 1.1rem; margin: 10px 0; background: #eee; padding: 10px; border-radius: 6px; text-align: center; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 8px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-main { background: var(--main); color: white; }
        .btn-sm { padding: 6px 10px; border-radius: 4px; border: none; font-size: 12px; color: white; cursor: pointer; }
        .toggle-btn { display: flex; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
        .toggle-opt { flex: 1; padding: 10px; text-align: center; background: #eee; cursor: pointer; }
        .toggle-opt.selected { background: var(--main); color: white; }
        .toggle-opt.income.selected { background: var(--success); }
        .hidden { display: none; }
        .list-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    </style>
</head>
<body>

<div id="top-bar" style="padding: 10px 15px 0 15px;">
    <div class="header-summary">
        <span id="header-month">----年--月</span>
        <span>支出: <b id="header-total">0</b> 円</span>
    </div>
</div>

<div id="page-home" class="page active">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <button onclick="changeMonth(-1)" style="border:none;background:none;font-size:24px;">◀</button>
        <button onclick="changeMonth(1)" style="border:none;background:none;font-size:24px;">▶</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div id="details-list" style="margin-top:20px;"></div>
</div>

<div id="page-report" class="page">
    <h2>分析・検索</h2>
    <div class="box" style="background: #e3f2fd;">
        <h4>今年の累計支出</h4>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <span style="font-size:12px; color:#666;" id="year-label">2026年 合計</span><br>
                <b style="font-size:1.4rem;" id="year-total">0</b> 円
            </div>
            <div style="text-align:right;">
                <span style="font-size:12px; color:#666;">月平均</span><br>
                <b id="year-avg">0</b> 円
            </div>
        </div>
    </div>
    <div class="box">
        <h4>今月の収支</h4>
        <div class="math-row" id="math-display">0 - (0 + 0) = 0</div>
        <p style="font-size:11px; text-align:center; color:#666;">予算 - (固定費 + 変動費) = 残金</p>
    </div>
    <div class="box">
        <h4>支払い方法別 (支出)</h4>
        <div id="method-summary"></div>
    </div>
    <div class="box">
        <h4>検索</h4>
        <input type="text" id="search-input" placeholder="キーワード検索..." oninput="runSearch()">
        <div id="search-results" style="max-height:150px; overflow-y:auto; font-size:12px;"></div>
    </div>
    <div class="box">
        <h4>ジャンル別支出</h4>
        <div id="genre-top3"></div>
        <div id="genre-more" class="hidden"></div>
        <button id="btn-toggle-genre" onclick="toggleGenre()" style="width:100%; background:none; border:none; color:var(--main); padding:10px;">▼ もっと見る</button>
    </div>
</div>

<div id="page-input" class="page">
    <h2 id="input-title-text">収支登録</h2>
    <input type="hidden" id="f-id">
    <div class="toggle-btn">
        <div id="type-out" class="toggle-opt selected" onclick="setType('out')">支出</div>
        <div id="type-in" class="toggle-opt income" onclick="setType('in')">収入</div>
    </div>
    <label>日付</label><input type="date" id="f-date">
    <label>タイトル</label><input type="text" id="f-title" placeholder="ガソリン代、給料など">
    <label>ジャンル</label><select id="f-genre"></select>
    <label>支払い方法</label><select id="f-method"></select>
    <label>金額</label><input type="number" id="f-amount" placeholder="金額を入力">
    <label>メモ</label><textarea id="f-memo" rows="2"></textarea>
    <button class="btn btn-main" onclick="saveEntry()">保存</button>
    <button id="btn-cancel-edit" class="btn" style="background:#ccc; margin-top:10px; display:none;" onclick="cancelEdit()">キャンセル</button>
</div>

<div id="page-settings" class="page">
    <h2>設定</h2>
    <div class="box">
        <label>今月の予算</label>
        <input type="number" id="s-budget">
        <button class="btn-sm" style="background:var(--main); width:100%;" onclick="saveBudget()">予算を保存</button>
    </div>

    <div class="box">
        <h4>年払いの固定費（車検・税金等）</h4>
        <div id="year-rec-list"></div>
        <hr>
        <div style="background:#f0f7ff; padding:10px; border-radius:8px;">
            <div style="display:flex; gap:5px;">
                <input type="number" id="yr-month" placeholder="月(1-12)" style="flex:1;">
                <input type="number" id="yr-day" placeholder="日" style="flex:1;">
            </div>
            <input type="text" id="yr-title" placeholder="項目名 (例: 自動車税)">
            <input type="number" id="yr-amount" placeholder="金額">
            <select id="yr-method"></select>
            <button class="btn-sm" style="background:var(--main); width:100%;" onclick="addYearRecurring()">年払いマスタに追加</button>
        </div>
    </div>

    <div class="box">
        <h4>月払いの固定費ひな形</h4>
        <div id="rec-list"></div>
        <hr>
        <div style="background:#f9f9f9; padding:10px; border-radius:8px;">
            <input type="text" id="r-title" placeholder="項目名 (例:家賃)">
            <input type="number" id="r-amount" placeholder="金額">
            <input type="number" id="r-day" placeholder="日 (1-31)">
            <select id="r-method"></select>
            <button class="btn-sm" style="background:var(--success); width:100%;" onclick="addRecurring()">月払いひな形を追加</button>
        </div>
    </div>

    <div class="box">
        <h4>マスターカスタマイズ</h4>
        <label>クレカ (名称:締:払)</label><input type="text" id="s-cards" placeholder="リクルート:15:10">
        <label>支払い方法 (カンマ区切り)</label><input type="text" id="s-methods">
        <label>ジャンル (カンマ区切り)</label><input type="text" id="s-genres">
        <button class="btn btn-main" onclick="saveCustoms()">設定を更新</button>
    </div>
    <div class="box">
        <h4>データバックアップ</h4>
        <button onclick="exportData()" class="btn" style="background:var(--sub); color:white; margin-bottom:10px;">全データをコピー</button>
        <textarea id="i-backup" placeholder="復元コードをここに貼り付け" rows="2"></textarea>
        <button onclick="importData()" class="btn-sm" style="background:var(--danger); width:100%;">データを復元</button>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" id="nav-home" onclick="showPage('home')"><span class="nav-icon">📅</span>カレンダー</div>
    <div class="nav-item" id="nav-report" onclick="showPage('report')"><span class="nav-icon">📊</span>分析</div>
    <div class="nav-item" id="nav-input" onclick="showPage('input')"><span class="nav-icon">✍</span>入力</div>
    <div class="nav-item" id="nav-settings" onclick="showPage('settings')"><span class="nav-icon">⚙</span>設定</div>
</div>

<script>
    // キー名をこれまでのもの（kb_final_...）で維持し、データを引き継ぐ
    let entries = JSON.parse(localStorage.getItem('kb_final_data')) || [];
    let settings = JSON.parse(localStorage.getItem('kb_final_sets')) || {
        budgets: {}, cards: [], methods: ["現金", "リクルート", "Olive", "PayPay"],
        genres: ["食費", "外食", "趣味", "旅行・観光", "交通費", "車", "固定費", "その他"],
        recurring: [],
        yearRecurring: [] // 追加項目
    };
    if(!settings.yearRecurring) settings.yearRecurring = []; // 古いデータがある場合への対策

    let currentViewDate = new Date();
    let currentType = 'out';

    function saveLocal() {
        localStorage.setItem('kb_final_data', JSON.stringify(entries));
        localStorage.setItem('kb_final_sets', JSON.stringify(settings));
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('nav-' + p).classList.add('active');
        if(p === 'home') renderCalendar();
        if(p === 'report') renderReport();
        if(p === 'settings') renderSettings();
        if(p === 'input') setupInput();
    }

    function setType(t) {
        currentType = t;
        document.getElementById('type-out').classList.toggle('selected', t === 'out');
        document.getElementById('type-in').classList.toggle('selected', t === 'in');
    }

    function getDayColor(sum) {
        const s = Math.abs(sum);
        if (sum > 0) return "#e8f5e9"; 
        if (s === 0) return "#fff";
        if (s < 1000) return "#f1f8e9"; 
        if (s < 5000) return "#e3f2fd"; 
        if (s < 10000) return "#fff9c4"; 
        if (s < 20000) return "#ffe0b2"; 
        if (s < 50000) return "#ffcdd2"; 
        return "#f3e5f5"; 
    }

    function checkRecurring() {
        const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        const mStr = `${y}-${String(m + 1).padStart(2, '0')}`;
        let updated = false;

        // 月払い
        settings.recurring.forEach(r => {
            const autoTitle = `[固定費] ${r.title}`;
            if(!entries.some(e => e.date.startsWith(mStr) && e.title === autoTitle)) {
                entries.push({
                    id: Date.now() + Math.random(),
                    date: `${mStr}-${String(r.day).padStart(2,'0')}`,
                    title: autoTitle, genre: "固定費", method: r.method,
                    amount: -Math.abs(r.amount), memo: "月次自動生成"
                });
                updated = true;
            }
        });

        // 年払い
        settings.yearRecurring.forEach(r => {
            if(parseInt(r.month) === (m + 1)) {
                const autoTitle = `[年払固定費] ${r.title}`;
                if(!entries.some(e => e.date.startsWith(mStr) && e.title === autoTitle)) {
                    entries.push({
                        id: Date.now() + Math.random(),
                        date: `${mStr}-${String(r.day).padStart(2,'0')}`,
                        title: autoTitle, genre: "固定費", method: r.method,
                        amount: -Math.abs(r.amount), memo: `${y}年分 年次自動生成`
                    });
                    updated = true;
                }
            }
        });

        if(updated) saveLocal();
    }

    function renderCalendar() {
        checkRecurring();
        const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        const mStr = `${y}-${String(m + 1).padStart(2, '0')}`;
        document.getElementById('header-month').textContent = `${y}年 ${m + 1}月`;
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
        let html = '', totalOut = 0;
        for(let i=0; i<first; i++) html += '<div class="day" style="background:#eee"></div>';
        for(let d=1; d<=last; d++) {
            const dStr = `${mStr}-${String(d).padStart(2,'0')}`;
            const dEntries = entries.filter(e => e.date === dStr);
            const dSum = dEntries.reduce((s, e) => s + e.amount, 0);
            if(dSum < 0) totalOut += Math.abs(dSum);
            let labels = "";
            settings.cards.forEach(c => {
                if(c.close === d) labels += `<span class="day-label" style="color:red">●[締]${c.name}</span>`;
                if(c.pay === d) labels += `<span class="day-label" style="color:blue">●[落]${c.name}</span>`;
            });
            html += `<div class="day" onclick="showDayDetails('${dStr}')" style="background:${getDayColor(dSum)}">
                <div><span>${d}</span>${labels}</div>
                <span class="day-sum" style="color:${dSum>0?'green':''}">${dSum !== 0 ? Math.abs(dSum).toLocaleString() : ''}</span>
            </div>`;
        }
        document.getElementById('calendar').innerHTML = html;
        document.getElementById('header-total').textContent = totalOut.toLocaleString();
    }

    function showDayDetails(date) {
        const list = entries.filter(e => e.date === date);
        let html = `<h4>${date} の内訳</h4>`;
        html += list.map(e => `
            <div class="box" style="margin-bottom:8px; padding:10px;">
                <b>${e.title}</b> <small>(${e.genre})</small>
                <div style="font-weight:bold; color:${e.amount>0?'green':''};">${e.amount.toLocaleString()}円 / ${e.method}</div>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <button class="btn-sm" style="background:orange; flex:1;" onclick="startEdit(${e.id})">編集</button>
                    <button class="btn-sm" style="background:red; flex:1;" onclick="deleteEntry(${e.id})">削除</button>
                </div>
            </div>`).join('') || "<p>データなし</p>";
        document.getElementById('details-list').innerHTML = html;
    }

    function setupInput() {
        if(!document.getElementById('f-id').value) {
            document.getElementById('f-date').valueAsDate = new Date();
            document.getElementById('f-title').value = "";
            document.getElementById('f-amount').value = "";
            document.getElementById('f-memo').value = "";
            setType('out');
        }
        document.getElementById('f-genre').innerHTML = settings.genres.map(g => `<option>${g}</option>`).join('');
        document.getElementById('f-method').innerHTML = settings.methods.map(m => `<option>${m}</option>`).join('');
    }

    function saveEntry() {
        const id = document.getElementById('f-id').value;
        const amtVal = Math.abs(parseInt(document.getElementById('f-amount').value) || 0);
        const entry = {
            id: id ? parseFloat(id) : Date.now(),
            date: document.getElementById('f-date').value,
            title: document.getElementById('f-title').value || "無題",
            genre: document.getElementById('f-genre').value,
            method: document.getElementById('f-method').value,
            amount: currentType === 'out' ? -amtVal : amtVal,
            memo: document.getElementById('f-memo').value
        };
        if(id) entries = entries.map(e => e.id == id ? entry : e);
        else entries.push(entry);
        saveLocal(); cancelEdit(); showPage('home');
    }

    function startEdit(id) {
        const e = entries.find(x => x.id == id);
        if(!e) return;
        showPage('input');
        document.getElementById('f-id').value = e.id;
        document.getElementById('f-date').value = e.date;
        document.getElementById('f-title').value = e.title;
        document.getElementById('f-genre').value = e.genre;
        document.getElementById('f-method').value = e.method;
        document.getElementById('f-amount').value = Math.abs(e.amount);
        document.getElementById('f-memo').value = e.memo;
        setType(e.amount >= 0 ? 'in' : 'out');
        document.getElementById('input-title-text').textContent = "明細を編集";
        document.getElementById('btn-cancel-edit').style.display = "block";
    }

    function cancelEdit() {
        document.getElementById('f-id').value = "";
        document.getElementById('input-title-text').textContent = "収支登録";
        document.getElementById('btn-cancel-edit').style.display = "none";
        setupInput();
    }

    function deleteEntry(id) {
        if(confirm("削除しますか？")) { entries = entries.filter(e => e.id != id); saveLocal(); renderCalendar(); document.getElementById('details-list').innerHTML = ""; }
    }

    function renderReport() {
        const currentY = currentViewDate.getFullYear();
        const mStr = `${currentY}-${String(currentViewDate.getMonth() + 1).padStart(2, '0')}`;
        
        // 年間累計
        const yearEntries = entries.filter(e => e.date.startsWith(String(currentY)) && e.amount < 0);
        const yTotal = Math.abs(yearEntries.reduce((s, e) => s + e.amount, 0));
        // データがある月数で割る（または現在の月数）
        const monthCount = (new Date().getFullYear() === currentY) ? (new Date().getMonth() + 1) : 12;
        
        document.getElementById('year-label').textContent = `${currentY}年 累計支出`;
        document.getElementById('year-total').textContent = yTotal.toLocaleString();
        document.getElementById('year-avg').textContent = Math.round(yTotal / monthCount).toLocaleString();

        const mEntries = entries.filter(e => e.date.startsWith(mStr));
        const budget = settings.budgets[mStr] || 0;
        const fix = Math.abs(mEntries.filter(e => (e.genre === "固定費" || e.title.includes("固定費]")) && e.amount < 0).reduce((s, e) => s + e.amount, 0));
        const vari = Math.abs(mEntries.filter(e => !(e.genre === "固定費" || e.title.includes("固定費]")) && e.amount < 0).reduce((s, e) => s + e.amount, 0));
        const remain = budget - (fix + vari);
        document.getElementById('math-display').innerHTML = `${budget.toLocaleString()} - (${fix.toLocaleString()} + ${vari.toLocaleString()}) = <b style="color:${remain < 0 ? 'red' : 'green'}">${remain.toLocaleString()}</b>`;
        
        const methodsMap = {};
        mEntries.filter(e => e.amount < 0).forEach(e => { methodsMap[e.method] = (methodsMap[e.method] || 0) + Math.abs(e.amount); });
        document.getElementById('method-summary').innerHTML = Object.entries(methodsMap).map(([n, v]) => `<div class="list-row"><span>${n}</span><b>${v.toLocaleString()}円</b></div>`).join('') || "記録なし";

        const genresMap = {};
        mEntries.filter(e => e.amount < 0).forEach(e => { genresMap[e.genre] = (genresMap[e.genre] || 0) + Math.abs(e.amount); });
        const sorted = Object.entries(genresMap).sort((a,b) => b[1] - a[1]);
        document.getElementById('genre-top3').innerHTML = sorted.slice(0, 3).map(([n, v]) => `<div class="list-row"><span>${n}</span><b>${v.toLocaleString()}円</b></div>`).join('');
        document.getElementById('genre-more').innerHTML = sorted.slice(3).map(([n, v]) => `<div class="list-row"><span>${n}</span><b>${v.toLocaleString()}円</b></div>`).join('');
    }

    function toggleGenre() {
        const m = document.getElementById('genre-more'); m.classList.toggle('hidden');
        document.getElementById('btn-toggle-genre').textContent = m.classList.contains('hidden') ? "▼ もっと見る" : "▲ 閉じる";
    }

    function runSearch() {
        const q = document.getElementById('search-input').value.toLowerCase();
        if(!q) { document.getElementById('search-results').innerHTML = ""; return; }
        const res = entries.filter(e => e.title.toLowerCase().includes(q) || e.memo.toLowerCase().includes(q)).reverse();
        document.getElementById('search-results').innerHTML = res.map(e => `<div style="padding:5px;border-bottom:1px solid #eee;">${e.date} ${e.title} (${e.amount}円)</div>`).join('');
    }

    function renderSettings() {
        const mStr = `${currentViewDate.getFullYear()}-${String(currentViewDate.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('s-budget').value = settings.budgets[mStr] || "";
        document.getElementById('s-cards').value = settings.cards.map(c => `${c.name}:${c.close}:${c.pay}`).join(', ');
        document.getElementById('s-methods').value = settings.methods.join(', ');
        document.getElementById('s-genres').value = settings.genres.join(', ');
        
        const methodOpts = settings.methods.map(m => `<option>${m}</option>`).join('');
        document.getElementById('r-method').innerHTML = methodOpts;
        document.getElementById('yr-method').innerHTML = methodOpts;
        
        // 月次
        document.getElementById('rec-list').innerHTML = settings.recurring.map((r, i) => `
            <div class="list-row"><span>${r.day}日: ${r.title} (${r.amount.toLocaleString()}円)</span><button class="btn-sm" style="background:red;" onclick="removeRecurring(${i})">削除</button></div>`).join('') || "未設定";
        
        // 年次
        document.getElementById('year-rec-list').innerHTML = settings.yearRecurring.map((r, i) => `
            <div class="list-row"><span>${r.month}月${r.day}日: ${r.title} (${r.amount.toLocaleString()}円)</span><button class="btn-sm" style="background:red;" onclick="removeYearRecurring(${i})">削除</button></div>`).join('') || "未設定";
    }

    function addRecurring() {
        const t = document.getElementById('r-title').value, a = parseInt(document.getElementById('r-amount').value), d = parseInt(document.getElementById('r-day').value), m = document.getElementById('r-method').value;
        if(!t || !a || !d) return;
        settings.recurring.push({ title: t, amount: a, day: d, method: m });
        saveLocal(); renderSettings();
        document.getElementById('r-title').value = ""; document.getElementById('r-amount').value = ""; document.getElementById('r-day').value = "";
    }
    function removeRecurring(i) { if(confirm("削除しますか？")) { settings.recurring.splice(i, 1); saveLocal(); renderSettings(); } }

    function addYearRecurring() {
        const mo = document.getElementById('yr-month').value, d = document.getElementById('yr-day').value, t = document.getElementById('yr-title').value, a = document.getElementById('yr-amount').value, m = document.getElementById('yr-method').value;
        if(!mo || !d || !t || !a) return;
        settings.yearRecurring.push({ month: mo, day: d, title: t, amount: parseInt(a), method: m });
        saveLocal(); renderSettings();
        document.getElementById('yr-month').value = ""; document.getElementById('yr-day').value = ""; document.getElementById('yr-title').value = ""; document.getElementById('yr-amount').value = "";
    }
    function removeYearRecurring(i) { if(confirm("削除しますか？")) { settings.yearRecurring.splice(i, 1); saveLocal(); renderSettings(); } }

    function saveBudget() { const mStr = `${currentViewDate.getFullYear()}-${String(currentViewDate.getMonth() + 1).padStart(2, '0')}`; settings.budgets[mStr] = parseInt(document.getElementById('s-budget').value) || 0; saveLocal(); alert("予算保存"); }
    function saveCustoms() {
        settings.methods = document.getElementById('s-methods').value.split(',').map(s => s.trim());
        settings.genres = document.getElementById('s-genres').value.split(',').map(s => s.trim());
        settings.cards = document.getElementById('s-cards').value.split(',').filter(s => s.includes(':')).map(s => {
            const [n, c, p] = s.split(':').map(x => x.trim()); return { name: n, close: parseInt(c), pay: parseInt(p) };
        });
        saveLocal(); alert("設定更新");
    }
    function changeMonth(d) { currentViewDate.setMonth(currentViewDate.getMonth() + d); renderCalendar(); }
    function exportData() { navigator.clipboard.writeText(JSON.stringify({entries, settings})); alert("コピー完了"); }
    function importData() { try { const d = JSON.parse(document.getElementById('i-backup').value); entries = d.entries; settings = d.settings; saveLocal(); location.reload(); } catch(e) { alert("失敗"); } }
    
    renderCalendar();
</script>
</body>
</html>
