<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿アプリ Pro - Fixed Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4a90e2; --bg: #f5f7fa; --white: #ffffff;
            --green: #d1e7dd; --blue: #cfe2ff; --pink: #f8d7da; --red: #f1aeb5; --purple: #e2d9f3;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* タブ */
        .tab-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); 
                   display: flex; background: var(--white); border-top: 1px solid #ddd; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--primary); border-top: 3px solid var(--primary); }
        .page { display: none; }
        .page.active { display: block; }

        /* カレンダー */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ddd; border: 1px solid #ddd; }
        .calendar-day { background: var(--white); min-height: 80px; padding: 5px; font-size: 11px; cursor: pointer; position: relative; box-sizing: border-box; }
        .day-num { font-weight: bold; font-size: 12px; }
        .info-tag { display: block; font-size: 8px; line-height: 1.1; margin-top: 1px; }
        .close-tag { color: #0056b3; }
        .pay-tag { color: #d00000; }
        .amount-display { display: block; margin-top: 5px; font-weight: bold; text-align: center; font-size: 10px; }

        /* 共通設定・分析スタイル */
        .config-section { background: var(--white); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; }
        
        .item-list { margin-bottom: 15px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 8px 12px; border-radius: 6px; margin-bottom: 5px; font-size: 13px; border: 1px solid #eee; }
        
        /* 分析表示 */
        .stats-box { display: flex; justify-content: space-between; background: #eee; padding: 10px; border-radius: 5px; margin-bottom: 8px; font-size: 14px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .more-btn { width: 100%; padding: 8px; background: none; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 5px; color: #666; }

        /* 曜日選択 */
        .weekday-picker { display: flex; gap: 4px; margin-bottom: 10px; }
        .wd-btn { flex: 1; padding: 8px 0; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .wd-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .btn-group-sm { display: flex; gap: 5px; }
        .small-btn { padding: 6px 10px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-blue { background: #e3f2fd; color: #0d47a1; }
        .btn-red { background: #ffebee; color: #c62828; }
        .btn-add { background: #333; color: white; width: 100%; margin-top: 5px; }

        .toggle-group { display: flex; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .toggle-btn { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; }
        .toggle-btn.active { background: var(--primary); color: white; }
        .template-area { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
        .temp-pill { padding: 5px 12px; background: #e9ecef; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div id="calendar" class="page active">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">◀</button>
            <h2 id="currentMonthLabel"></h2>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div id="dayDetails" class="item-list" style="margin-top:15px;"></div>
    </div>

    <div id="input" class="page">
        <h2>入力</h2>
        <div class="config-section">
            <label>テンプレート</label>
            <div id="templatePills" class="template-area"></div>
            <div class="toggle-group">
                <button id="typeExpense" class="toggle-btn active" onclick="setEntryType('expense')">支出</button>
                <button id="typeIncome" class="toggle-btn" onclick="setEntryType('income')">収入</button>
            </div>
            <input type="hidden" id="fId">
            <label>日付</label><input type="date" id="fDate">
            <label>タイトル</label><input type="text" id="fTitle">
            <label>金額</label><input type="number" id="fAmount">
            <label>ジャンル</label><select id="fGenre"></select>
            <label>支払い方法</label><select id="fMethod"></select>
            <label>メモ</label><textarea id="fMemo"></textarea>
            <button class="submit-btn" onclick="saveEntry()">保存</button>
            <button id="cancelEdit" style="display:none; margin-top:5px;" class="small-btn" onclick="resetForm()">キャンセル</button>
        </div>
    </div>

    <div id="analysis" class="page">
        <h2>分析</h2>
        <div class="config-section">
            <div class="stats-box"><span>年間支出合計:</span><span id="yearTotal">0円</span></div>
            <div class="stats-box"><span>今月支出合計:</span><span id="monthTotal">0円</span></div>
            <p id="budgetProgress" style="font-size:12px; text-align:right; margin: 0 0 15px 0; color: #666;"></p>
            <canvas id="genreChart" style="max-height:250px; margin-bottom:20px;"></canvas>
            
            <h3>ジャンル別ランキング</h3>
            <div id="genreRanking"></div>
            
            <h3 style="margin-top:20px;">支払い方法別ランキング</h3>
            <div id="methodRanking"></div>
        </div>
    </div>

    <div id="settings" class="page">
        <h2>設定</h2>
        <div class="config-section">
            <label>基本設定</label>
            <label style="font-size:11px;">今月の予算</label><input type="number" id="setBudget" onchange="updateMaster()">
            <label style="font-size:11px;">支払い方法 (カンマ区切り)</label><input type="text" id="setMethods" onchange="updateMaster()">
            <label style="font-size:11px;">ジャンル (カンマ区切り)</label><input type="text" id="setGenres" onchange="updateMaster()">
        </div>

        <div class="config-section">
            <label>テンプレート管理</label>
            <div id="templateListDisplay" class="item-list"></div>
            <div style="border: 1px dashed #ccc; padding: 10px; border-radius: 8px;">
                <input type="hidden" id="tIdx" value="-1">
                <input type="text" id="tName" placeholder="テンプレ表示名">
                <input type="text" id="tTitle" placeholder="タイトル">
                <input type="number" id="tAmount" placeholder="金額">
                <select id="tGenre"></select><select id="tMethod"></select>
                <button class="small-btn btn-add" onclick="addTemplate()">保存/更新</button>
            </div>
        </div>

        <div class="config-section">
            <label>クレジットカード管理</label>
            <div id="cardListDisplay" class="item-list"></div>
            <div style="border: 1px dashed #ccc; padding: 10px; border-radius: 8px;">
                <input type="hidden" id="cIdx" value="-1">
                <input type="text" id="cName" placeholder="カード名">
                <div style="display:flex; gap:5px;"><input type="number" id="cClose" placeholder="締日"><input type="number" id="cPay" placeholder="引落日"></div>
                <button class="small-btn btn-add" onclick="addCard()">保存/更新</button>
            </div>
        </div>

        <div class="config-section">
            <label>固定費管理</label>
            <div id="fixedListDisplay" class="item-list"></div>
            <div style="border: 1px dashed #ccc; padding: 10px; border-radius: 8px;">
                <input type="hidden" id="fixIdx" value="-1">
                <input type="text" id="fixTitle" placeholder="固定費名">
                <input type="number" id="fixAmount" placeholder="金額">
                <select id="fixType" onchange="toggleFixValUI()">
                    <option value="monthly">毎月 (日)</option><option value="weekly">毎週 (曜日)</option><option value="yearly">毎年 (MM-DD)</option>
                </select>
                <div id="fixVal_text"><input type="text" id="fixVal" placeholder="例: 15"></div>
                <div id="fixVal_week" style="display:none;" class="weekday-picker">
                    <button class="wd-btn" onclick="toggleWD(this)">日</button><button class="wd-btn" onclick="toggleWD(this)">月</button>
                    <button class="wd-btn" onclick="toggleWD(this)">火</button><button class="wd-btn" onclick="toggleWD(this)">水</button>
                    <button class="wd-btn" onclick="toggleWD(this)">木</button><button class="wd-btn" onclick="toggleWD(this)">金</button>
                    <button class="wd-btn" onclick="toggleWD(this)">土</button>
                </div>
                <button class="small-btn btn-add" onclick="addFixed()">保存/更新</button>
            </div>
        </div>

        <div class="config-section">
            <button class="small-btn" onclick="exportJSON()">JSON出力</button>
            <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
            <button class="small-btn" onclick="document.getElementById('importFile').click()">JSON復元</button>
        </div>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-btn active" onclick="showPage('calendar')">カレンダー</button>
    <button class="tab-btn" onclick="showPage('input')">入力</button>
    <button class="tab-btn" onclick="showPage('analysis')">分析</button>
    <button class="tab-btn" onclick="showPage('settings')">設定</button>
</nav>

<script>
    const STORAGE_KEY = 'kakeibo_v11_fixed';
    let appData = { entries: [], settings: { budget: 200000, methods: ["現金", "PayPay", "JCBW"], genres: ["食費", "交通費", "趣味", "固定費"], cards: [], fixed: [], templates: [] } };
    let viewDate = new Date();
    let entryType = 'expense';
    let chartInstance = null;
    const WEEK_DAYS = ["日", "月", "火", "水", "木", "金", "土"];

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
    function loadData() { const saved = localStorage.getItem(STORAGE_KEY); if(saved) appData = JSON.parse(saved); }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
        if(pageId === 'calendar') { checkAndApplyFixedCosts(); renderCalendar(); }
        if(pageId === 'input') setupInput();
        if(pageId === 'analysis') renderAnalysis();
        if(pageId === 'settings') renderSettings();
    }

    // --- カレンダー描画 ---
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('currentMonthLabel').innerText = `${y}年${m+1}月`;
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m+1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-day" style="background:#f9f9f9"></div>`;
        for(let d=1; d<=last; d++) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEntries = appData.entries.filter(e => e.date === dateStr);
            const total = dayEntries.reduce((s, e) => s + Number(e.amount), 0);
            let bg = "var(--white)";
            if(total < 0) {
                const abs = Math.abs(total);
                if(abs < 1000) bg = "var(--green)";
                else if(abs < 3000) bg = "var(--blue)";
                else if(abs < 5000) bg = "var(--pink)";
                else if(abs < 10000) bg = "var(--red)";
                else bg = "var(--purple)";
            } else if(total > 0) bg = "#fff3cd";

            let infoHtml = "";
            appData.settings.cards.forEach(c => {
                if(d == c.close) infoHtml += `<span class="info-tag close-tag">${c.name} 締</span>`;
                if(d == c.pay) infoHtml += `<span class="info-tag pay-tag">${c.name} 引</span>`;
            });

            grid.innerHTML += `<div class="calendar-day" style="background:${bg}" onclick="showDayDetails('${dateStr}')">
                <span class="day-num">${d}</span>${infoHtml}
                <span class="amount-display">${total!=0?total.toLocaleString():''}</span></div>`;
        }
    }

    function showDayDetails(date) {
        const items = appData.entries.filter(e => e.date === date);
        let h = `<h3>${date}</h3>`;
        items.forEach(e => {
            h += `<div class="list-row"><span>${e.title}: ${Number(e.amount).toLocaleString()}円</span>
                <div class="btn-group-sm"><button class="small-btn btn-blue" onclick="startEdit(${e.id})">編</button>
                <button class="small-btn btn-red" onclick="deleteEntry(${e.id})">消</button></div></div>`;
        });
        document.getElementById('dayDetails').innerHTML = items.length ? h : "記録なし";
    }

    // --- 分析機能 ---
    function renderAnalysis() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const yearEntries = appData.entries.filter(e => new Date(e.date).getFullYear() === y && e.amount < 0);
        const monthEntries = yearEntries.filter(e => new Date(e.date).getMonth() === m);
        
        const yTotal = yearEntries.reduce((s, e) => s + Math.abs(e.amount), 0);
        const mTotal = monthEntries.reduce((s, e) => s + Math.abs(e.amount), 0);
        
        document.getElementById('yearTotal').innerText = `${yTotal.toLocaleString()}円`;
        document.getElementById('monthTotal').innerText = `${mTotal.toLocaleString()}円`;
        document.getElementById('budgetProgress').innerText = `予算残高: ${(appData.settings.budget - mTotal).toLocaleString()}円`;

        const genres = {}, methods = {};
        monthEntries.forEach(e => {
            genres[e.genre] = (genres[e.genre] || 0) + Math.abs(e.amount);
            methods[e.method] = (methods[e.method] || 0) + Math.abs(e.amount);
        });

        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('genreChart'), {
            type: 'doughnut',
            data: { labels: Object.keys(genres), datasets: [{ data: Object.values(genres), backgroundColor: ['#ff6384','#36a2eb','#ffce56','#4bc0c0','#9966ff'] }] }
        });

        renderRank('genreRanking', genres);
        renderRank('methodRanking', methods);
    }

    function renderRank(id, data) {
        const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]);
        const target = document.getElementById(id);
        const top5 = sorted.slice(0, 5);
        let h = top5.map(x => `<div class="rank-item"><span>${x[0]}</span><span>${x[1].toLocaleString()}円</span></div>`).join('');
        if(sorted.length > 5) {
            h += `<button class="more-btn" onclick="this.style.display='none'; document.getElementById('${id}_rest').style.display='block'">もっと見る</button>`;
            h += `<div id="${id}_rest" style="display:none">${sorted.slice(5).map(x => `<div class="rank-item"><span>${x[0]}</span><span>${x[1].toLocaleString()}円</span></div>`).join('')}</div>`;
        }
        target.innerHTML = h || "データなし";
    }

    // --- 設定画面 (修正済) ---
    function renderSettings() {
        document.getElementById('setBudget').value = appData.settings.budget;
        document.getElementById('setMethods').value = appData.settings.methods.join(',');
        document.getElementById('setGenres').value = appData.settings.genres.join(',');

        const gOpts = appData.settings.genres.map(g => `<option>${g}</option>`).join('');
        const mOpts = appData.settings.methods.map(m => `<option>${m}</option>`).join('');
        document.getElementById('tGenre').innerHTML = gOpts; document.getElementById('tMethod').innerHTML = mOpts;

        renderList('templateListDisplay', appData.settings.templates, (t, i) => `
            <div class="list-row"><span>${t.name} (${t.amount}円)</span>
            <div class="btn-group-sm"><button class="small-btn btn-blue" onclick="editTemplate(${i})">編集</button>
            <button class="small-btn btn-red" onclick="appData.settings.templates.splice(${i},1);saveData();renderSettings()">削除</button></div></div>`);

        renderList('cardListDisplay', appData.settings.cards, (c, i) => `
            <div class="list-row"><span>${c.name} (締:${c.close} 引:${c.pay})</span>
            <div class="btn-group-sm"><button class="small-btn btn-blue" onclick="editCard(${i})">編集</button>
            <button class="small-btn btn-red" onclick="appData.settings.cards.splice(${i},1);saveData();renderSettings()">削除</button></div></div>`);

        renderList('fixedListDisplay', appData.settings.fixed, (f, i) => `
            <div class="list-row"><span>${f.title} (${f.amount}円 / ${f.val})</span>
            <div class="btn-group-sm"><button class="small-btn btn-blue" onclick="editFixed(${i})">編集</button>
            <button class="small-btn btn-red" onclick="appData.settings.fixed.splice(${i},1);saveData();renderSettings()">削除</button></div></div>`);
    }

    function renderList(id, data, htmlFn) { document.getElementById(id).innerHTML = data.map((item, i) => htmlFn(item, i)).join(''); }

    // --- 保存・更新アクション (ロジック修正) ---
    function addTemplate() {
        const idx = parseInt(document.getElementById('tIdx').value);
        const obj = { name: document.getElementById('tName').value, title: document.getElementById('tTitle').value, amount: Number(document.getElementById('tAmount').value), genre: document.getElementById('tGenre').value, method: document.getElementById('tMethod').value };
        if (idx === -1) appData.settings.templates.push(obj); else appData.settings.templates[idx] = obj;
        saveData(); renderSettings(); clearForm(['tIdx','tName','tTitle','tAmount']);
    }
    function addCard() {
        const idx = parseInt(document.getElementById('cIdx').value);
        const obj = { name: document.getElementById('cName').value, close: parseInt(document.getElementById('cClose').value), pay: parseInt(document.getElementById('cPay').value) };
        if (idx === -1) appData.settings.cards.push(obj); else appData.settings.cards[idx] = obj;
        saveData(); renderSettings(); clearForm(['cIdx','cName','cClose','cPay']);
    }
    function addFixed() {
        const idx = parseInt(document.getElementById('fixIdx').value);
        let val = document.getElementById('fixVal').value;
        if(document.getElementById('fixType').value === 'weekly') {
            val = Array.from(document.querySelectorAll('#fixVal_week .wd-btn.active')).map(b => b.innerText).join(',');
        }
        const obj = { title: document.getElementById('fixTitle').value, amount: Number(document.getElementById('fixAmount').value), type: document.getElementById('fixType').value, val: val };
        if (idx === -1) appData.settings.fixed.push(obj); else appData.settings.fixed[idx] = obj;
        saveData(); renderSettings(); clearForm(['fixIdx','fixTitle','fixAmount','fixVal']);
        document.querySelectorAll('.wd-btn').forEach(b => b.classList.remove('active'));
    }

    // --- 編集モード呼び出し ---
    function editTemplate(i) {
        const t = appData.settings.templates[i]; document.getElementById('tIdx').value = i;
        document.getElementById('tName').value = t.name; document.getElementById('tTitle').value = t.title;
        document.getElementById('tAmount').value = t.amount; document.getElementById('tGenre').value = t.genre; document.getElementById('tMethod').value = t.method;
    }
    function editCard(i) {
        const c = appData.settings.cards[i]; document.getElementById('cIdx').value = i;
        document.getElementById('cName').value = c.name; document.getElementById('cClose').value = c.close; document.getElementById('cPay').value = c.pay;
    }
    function editFixed(i) {
        const f = appData.settings.fixed[i]; document.getElementById('fixIdx').value = i;
        document.getElementById('fixTitle').value = f.title; document.getElementById('fixAmount').value = f.amount;
        document.getElementById('fixType').value = f.type; toggleFixValUI();
        if(f.type === 'weekly') {
            const activeWds = f.val.split(',');
            document.querySelectorAll('.wd-btn').forEach(b => b.classList.toggle('active', activeWds.includes(b.innerText)));
        } else { document.getElementById('fixVal').value = f.val; }
    }

    // --- その他 ---
    function toggleFixValUI() {
        const isWeekly = document.getElementById('fixType').value === 'weekly';
        document.getElementById('fixVal_text').style.display = isWeekly ? 'none' : 'block';
        document.getElementById('fixVal_week').style.display = isWeekly ? 'flex' : 'none';
    }
    function toggleWD(btn) { btn.classList.toggle('active'); }
    function clearForm(ids) { ids.forEach(id => document.getElementById(id).value = id.includes('Idx') ? "-1" : ""); }
    function checkAndApplyFixedCosts() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth(), days = new Date(y, m+1, 0).getDate();
        let changed = false;
        appData.settings.fixed.forEach(f => {
            for(let d=1; d<=days; d++) {
                const dateObj = new Date(y, m, d), dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let hit = false;
                if(f.type==='yearly') { const [fm, fd]=f.val.split('-').map(Number); if(m+1===fm && d===fd) hit=true; }
                else if(f.type==='monthly') { if(d===parseInt(f.val)) hit=true; }
                else if(f.type==='weekly') { if(f.val.split(',').includes(WEEK_DAYS[dateObj.getDay()])) hit=true; }
                if(hit && !appData.entries.some(e => e.date===dStr && e.title===f.title)) {
                    appData.entries.push({ id: Date.now()+Math.random(), date: dStr, title: f.title, amount: -Math.abs(f.amount), genre: "固定費", method: appData.settings.methods[0], memo: "自動" });
                    changed = true;
                }
            }
        });
        if(changed) saveData();
    }
    function setupInput() {
        document.getElementById('fGenre').innerHTML = appData.settings.genres.map(x => `<option>${x}</option>`).join('');
        document.getElementById('fMethod').innerHTML = appData.settings.methods.map(x => `<option>${x}</option>`).join('');
        document.getElementById('fDate').valueAsDate = new Date();
        document.getElementById('templatePills').innerHTML = appData.settings.templates.map((t, i) => `<div class="temp-pill" onclick="applyTemplate(${i})">${t.name}</div>`).join('');
    }
    function applyTemplate(i) {
        const t = appData.settings.templates[i]; document.getElementById('fTitle').value = t.title; document.getElementById('fAmount').value = Math.abs(t.amount);
        document.getElementById('fGenre').value = t.genre; document.getElementById('fMethod').value = t.method;
        setEntryType(t.amount < 0 ? 'expense' : 'income');
    }
    function setEntryType(t) { entryType = t; document.getElementById('typeExpense').classList.toggle('active', t==='expense'); document.getElementById('typeIncome').classList.toggle('active', t==='income'); }
    function saveEntry() {
        const id = document.getElementById('fId').value;
        const entry = { id: id ? Number(id) : Date.now(), date: document.getElementById('fDate').value, title: document.getElementById('fTitle').value, amount: entryType==='expense' ? -Number(document.getElementById('fAmount').value) : Number(document.getElementById('fAmount').value), genre: document.getElementById('fGenre').value, method: document.getElementById('fMethod').value, memo: document.getElementById('fMemo').value };
        if(id) appData.entries = appData.entries.map(e => e.id == id ? entry : e); else appData.entries.push(entry);
        saveData(); resetForm(); showPage('calendar');
    }
    function deleteEntry(id) { if(confirm("消去しますか？")) { appData.entries = appData.entries.filter(e => e.id !== id); saveData(); renderCalendar(); } }
    function startEdit(id) {
        const e = appData.entries.find(x => x.id === id); showPage('input');
        document.getElementById('fId').value = e.id; document.getElementById('fDate').value = e.date; document.getElementById('fTitle').value = e.title;
        document.getElementById('fAmount').value = Math.abs(e.amount); setEntryType(e.amount < 0 ? 'expense' : 'income');
        document.getElementById('fGenre').value = e.genre; document.getElementById('fMethod').value = e.method; document.getElementById('fMemo').value = e.memo;
        document.getElementById('cancelEdit').style.display = "block";
    }
    function resetForm() { document.getElementById('fId').value = ""; document.getElementById('fTitle').value = ""; document.getElementById('fAmount').value = ""; document.getElementById('cancelEdit').style.display = "none"; }
    function updateMaster() {
        appData.settings.budget = Number(document.getElementById('setBudget').value);
        appData.settings.methods = document.getElementById('setMethods').value.split(',').map(x => x.trim());
        appData.settings.genres = document.getElementById('setGenres').value.split(',').map(x => x.trim());
        saveData(); renderSettings();
    }
    function exportJSON() { const blob = new Blob([JSON.stringify(appData, null, 2)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "kakeibo_backup.json"; a.click(); }
    function importJSON(e) { 
        const reader = new FileReader(); 
        reader.onload = (ev) => { try { appData = JSON.parse(ev.target.result); saveData(); alert("復元完了"); showPage('calendar'); } catch(err) { alert("エラー"); } }; 
        reader.readAsText(e.target.files[0]); 
    }
    function changeMonth(diff) { viewDate.setMonth(viewDate.getMonth() + diff); renderCalendar(); }
    window.onload = () => { loadData(); renderCalendar(); };
</script>
</body>
</html>
